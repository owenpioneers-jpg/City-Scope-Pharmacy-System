<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="patient-dashboard">

<nav class="navbar">
  <div class="logo">City Scope Pharmacy System</div>
  
  <div class="menu-toggle" id="mobile-menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>

  <ul class="nav-links">
  
  </ul>
</nav>

<div class="signup-box">
  <h2>Patients</h2>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Phone</th>
        <th>Address</th>
      </tr>
    </thead>
    <tbody id="patientTable">
    </tbody>
  </table>
</div>

<script src="js/navbar.js"></script>

<script src="js/patients.js"></script>
<footer class="footer">
  <div class="footer-content">

    <div>
      <h3>City Scope Pharmacy System</h3>
      <p>Your digital health partner.</p>
    </div>

    <div class="footer-links">
  <h4 id="quickLinksToggle" class="quick-links-title">
    Quick Links ▾
  </h4>

  <ul id="quickLinksMenu" class="quick-links-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="signup.html">Sign Up</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</div>

    <div>
      <h4>Contact</h4>
      <p>Email: cityscope@pharmacy.com</p>
      <p>Phone: +254 115 185 085</p>
    </div>

  </div>

  <p class="copy">© 2026 City Scope Pharmacy System. All rights reserved.</p>
</footer>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggle = document.getElementById("quickLinksToggle");
  const menu = document.getElementById("quickLinksMenu");

  if (!toggle || !menu) return;

  toggle.addEventListener("click", () => {
    menu.classList.toggle("show");

    toggle.innerHTML = menu.classList.contains("show")
      ? "Quick Links ▴"
      : "Quick Links ▾";
  });
});
</script>
</body>
</html>
